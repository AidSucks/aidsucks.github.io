<script src="/assets/js/fancifymytext.js"></script>

<div class="container my-3">

	<div class="row justify-content-center">

		<div class="col-12 col-sm-10 col-md-8 col-lg-6 shadow p-3 rounded-2">

			<h3>Fancify My Text</h3>

			<form>

				<fieldset class="border border-secondary rounded-2 p-3 mb-3">
					
					<legend>Text</legend>
					<textarea style="resize: none;" id="fancifyTextInput" class="form-control w-auto" rows="4" cols="30"></textarea>
				
				</fieldset>

				<fieldset class="border border-secondary rounded-2 p-3">
					
					<legend>Fancify</legend>

					<div class="vstack gap-2 col-12 col-sm-8 col-md-6 col-lg-4">

						<button class="btn btn-outline-primary" type="button" onclick="increaseFontSize();">Bigger!</button>

						<button class="btn btn-outline-success" type="button" onclick="moo();">Moo</button>

					</div>

					<div class="form-check my-2">
						<input class="form-check-input" type="radio" name="radios" id="fancy" checked onchange="setBold(true);">
						<label class="form-check-label" for="fancy">Fancy Shmancy</label>
					</div>

					<div class="form-check my-2">
						<input class="form-check-input" type="radio" name="radios" id="boring" checked onchange="setBold(false);">
						<label class="form-check-label" for="boring">Boring Betty</label>
					</div>

				</fieldset>

			</form>

		</div>

	</div>

</div>
