<!DOCTYPE html>
<html lang="en">
<head>
  	<meta charset="UTF-8">
  	<meta name="viewport" content="width=device-width, initial-scale=1.0">
  	<title>Fancify Shamcify</title>

  	<!-- Links -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link href="/public/stylesheets/navbar.css" rel="stylesheet">

	<!-- Scripts -->
	<script src="fancifymytext.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<body>

	<!-- NAVBAR -->
	<nav class="navbar navbar-expand bg-dark sticky-top" data-bs-theme="dark">
		<div class="container-fluid justify-content-center">
			<div class="navbar-nav">
				<div class="nav-item">
					<a class="nav-link" href="/">Home</a>
				</div>
				<div class="nav-item">
					<a class="nav-link" href="/about">About</a>
				</div>
				<div class="nav-item">
					<a class="nav-link" href="/projects">Projects</a>
				</div>
				<div class="nav-item">
					<a class="nav-link" href="/contact">Contact</a>
				</div>
			</div>
		</div>
	</nav>

	<!-- MAIN CONTENT -->

  	<div class="container my-3">

		<div class="row justify-content-center">

			<div class="col-12 col-sm-10 col-md-8 col-lg-6 shadow p-3 rounded-2">

				<h3>Fancify My Text</h3>

				<form>

					<fieldset class="border border-secondary rounded-2 p-3 mb-3">
						
						<legend>Text</legend>
						<textarea style="resize: none;" id="fancifyTextInput" class="form-control w-auto" rows="4" cols="30"></textarea>
					
					</fieldset>

					<fieldset class="border border-secondary rounded-2 p-3">
						
						<legend>Fancify</legend>

						<div class="vstack gap-2 col-12 col-sm-8 col-md-6 col-lg-4">

							<button class="btn btn-outline-primary" type="button" onclick="increaseFontSize();">Bigger!</button>

							<button class="btn btn-outline-success" type="button" onclick="moo();">Moo</button>

						</div>

						<div class="form-check my-2">
							<input class="form-check-input" type="radio" name="radios" id="fancy" checked onchange="setBold(true);">
							<label class="form-check-label" for="fancy">Fancy Shmancy</label>
						</div>

						<div class="form-check my-2">
							<input class="form-check-input" type="radio" name="radios" id="boring" checked onchange="setBold(false);">
							<label class="form-check-label" for="boring">Boring Betty</label>
						</div>

					</fieldset>

				</form>

			</div>

		</div>

	</div>

</body>
</html>
