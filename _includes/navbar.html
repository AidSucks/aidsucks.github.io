
<nav class="navbar navbar-expand bg-dark sticky-top" data-bs-theme="dark">
	
	<div class="container-fluid justify-content-center">

		<div class="navbar-nav">

			{% for route in site.data.routes %}

				<div class="nav-item">

					<a 
						class="nav-link fw-bold px-sm-3 {% if route.href == page.permalink %}active{% endif %}"
						href="{{ route.href }}"
					>
						{{ route.label }}
					</a>
			
				</div>

			{% endfor %}

	</div>

</nav>
